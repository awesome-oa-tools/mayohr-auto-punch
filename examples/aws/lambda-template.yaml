AWSTemplateFormatVersion: "2010-09-09"
Description: "MayoHR Auto Punch Lambda Function"

Parameters:
  ImageUri:
    Type: String
    Description: "Your Docker image URI"
  MsDomain:
    Type: String
    Description: "Your Microsoft domain"
  MsUsername:
    Type: String
    Description: "Your Microsoft username"
  TelegramEnabled:
    Type: String
    Description: "Enable Telegram notification?"
    Default: "false"
  TelegramChatId:
    Type: String
    Description: "Your Telegram chat ID"

Resources:
  MayohrAutoPunchFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: mayohr-auto-punch
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 180
      MemorySize: 1024
      Architectures:
        - x86_64
      ImageConfig:
        Command:
          - "dist/function/index.handler"
        EntryPoint:
          - "node"
          - "/usr/local/lib/node_modules/aws-lambda-ric/index.mjs"
        WorkingDirectory: "/var/task"
      Environment:
        Variables:
          HEADLESS: "true"
          MS_DOMAIN: !Ref MsDomain
          MS_USERNAME: !Ref MsUsername
          TELEGRAM_ENABLED: !Ref TelegramEnabled
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
          NODE_DEBUG: ""
          SCREENSHOT_S3_BUCKET: !Ref ScreenshotBucket
      LoggingConfig:
        LogGroup: !Ref MayohrAutoPunchLogGroup

  MayohrAutoPunchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/mayohr-auto-punch"
      RetentionInDays: 5

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mayohr-auto-punch/*
        - PolicyName: S3ScreenshotAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::mayohr-auto-punch-screenshots-${AWS::AccountId}/screenshots/*"
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/mayohr-auto-punch:*"

  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "mayohr-auto-punch-screenshots-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldScreenshots
            Status: Enabled
            ExpirationInDays: 7

  MorningPunchRule:
    Type: AWS::Events::Rule
    Properties:
      Name: mayohr-morning-punch
      Description: "Trigger morning punch at 9:00 AM on weekdays"
      ScheduleExpression: "cron(0 1 ? * MON-FRI *)" # UTC 1:00 = GMT+8 9:00
      State: ENABLED
      Targets:
        - Arn: !GetAtt MayohrAutoPunchFunction.Arn
          Id: MorningPunchTarget

  EveningPunchRule:
    Type: AWS::Events::Rule
    Properties:
      Name: mayohr-evening-punch
      Description: "Trigger evening punch at 6:05 PM on weekdays"
      ScheduleExpression: "cron(5 10 ? * MON-FRI *)" # UTC 10:05 = GMT+8 18:05
      State: ENABLED
      Targets:
        - Arn: !GetAtt MayohrAutoPunchFunction.Arn
          Id: EveningPunchTarget

  MorningPunchPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MayohrAutoPunchFunction
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt MorningPunchRule.Arn

  EveningPunchPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MayohrAutoPunchFunction
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt EveningPunchRule.Arn